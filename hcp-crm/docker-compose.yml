version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hcp-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hcp_user
      POSTGRES_PASSWORD: hcp_password
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - hcp_crm_pgdata:/var/lib/postgresql/data

volumes:
  hcp_crm_pgdata:
